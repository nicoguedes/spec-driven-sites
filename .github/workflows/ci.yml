# CI gates — nothing reaches `main` without these passing.
#
# Tuned for this site factory: pnpm + Turborepo + Next.js static export.
# The job split (lint · typecheck · build · lighthouse) is the contract.
#
# See: CONSTITUTION.md ("Prime directives", "Definition of Done",
#      "Performance & accessibility gate").

name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        # Each app's `next build` typechecks; this is an explicit, fast gate too.
        run: pnpm -r exec tsc --noEmit

      - name: Build (static export)
        # AdSense/error wiring is env-gated, so the build is correct with these unset.
        # Set them as repository secrets/vars to bake real values into a release build.
        env:
          NEXT_PUBLIC_ADSENSE_CLIENT: ${{ vars.NEXT_PUBLIC_ADSENSE_CLIENT }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: pnpm build

      - name: Upload static export
        uses: actions/upload-artifact@v4
        with:
          name: example-out
          path: apps/example/out
          if-no-files-found: ignore

  # Optional performance/SEO/a11y gate. Enable once the site has real pages.
  # Requires a lighthouserc to define the URL set and assertions (see comment below).
  lighthouse:
    name: lighthouse (optional)
    runs-on: ubuntu-latest
    needs: build
    # Flip to `true` (or remove the guard) to make Lighthouse a required gate.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "lts/*", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Serve apps/example/out and assert Lighthouse categories ≥ 0.9.
      # Add a `lighthouserc.json` with `ci.collect.staticDistDir: "apps/example/out"`
      # and `ci.assert` thresholds, then:
      #   npx @lhci/cli autorun
      - name: Lighthouse CI
        run: |
          echo "TODO: add lighthouserc.json and run: npx @lhci/cli autorun"
          echo "Gate: Performance / SEO / Best-Practices / Accessibility each >= 0.9"
